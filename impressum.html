<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impressum - DOSCHAUHER, EIN MORD!</title>
    <link rel="stylesheet" href="style.css">
    <!-- Adobe Fonts (Typekit) für TT Modernoir -->
    <link rel="stylesheet" href="https://use.typekit.net/yxu7vvd.css">
</head>
<body class="center-content" style="padding: 2rem; min-height: 100vh;">
    <!-- Vintage paper texture -->
    <div class="paper-texture"></div>

    <div class="card" style="max-width: 600px; width: 100%; margin: 2rem auto;">
        <h1 class="title" style="margin-bottom: 2rem; font-size: 2.5rem;">Impressum</h1>
        
        <div class="typewriter" style="margin-bottom: 1.5rem;">
            <h2 class="typewriter" style="font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--color-red); font-weight: bold;">Angaben gemäß § 5 DDG:</h2>
            <p>[DEIN VOLLSTÄNDIGER NAME / VEREINSNAME]</p>
            <p>[STRASSE UND HAUSNUMMER]</p>
            <p>[PLZ UND ORT]</p>
        </div>

        <div class="typewriter" style="margin-bottom: 1.5rem;">
            <h2 class="typewriter" style="font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--color-red); font-weight: bold;">Kontakt:</h2>
            <p>Telefon: [DEINE TELEFONNUMMER]</p>
            <p>E-Mail: [DEINE E-MAIL-ADRESSE]</p>
        </div>

        <div class="typewriter" style="margin-bottom: 2rem;">
            <h2 class="typewriter" style="font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--color-red); font-weight: bold;">Vertreten durch:</h2>
            <p>[NUR BEI VEREIN/FIRMA: NAME DES VERTRETUNGSBERECHTIGTEN VORSTANDS/GESCHÄFTSFÜHRERS]</p>
        </div>

        <button onclick="window.close();" class="btn-retro btn-small">Fenster schließen</button>
    </div>
</body>
</html>
